name: Deploy Backend to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      APP_DIR: ${{ vars.APP_DIR || '/opt/arborlearn' }}
      SERVICE_NAME: ${{ vars.BACKEND_SERVICE_NAME || 'arborlearn-backend.service' }}

    steps:
      - name: Validate deployment configuration
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          missing=0
          for name in SERVER_HOST SERVER_USER SERVER_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare SSH key
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -e
          SSH_HOST="$(printf '%s' "$SERVER_HOST" | tr -d '[:space:]')"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/arborlearn_deploy_key
          chmod 600 ~/.ssh/arborlearn_deploy_key
          ssh-keygen -y -f ~/.ssh/arborlearn_deploy_key > ~/.ssh/arborlearn_deploy_key.pub
          echo "Deploy key fingerprint:"
          ssh-keygen -lf ~/.ssh/arborlearn_deploy_key.pub
          ssh-keyscan -H "$SSH_HOST" 2>/dev/null >> ~/.ssh/known_hosts

      - name: Deploy backend via SSH
        run: |
          set -e
          SSH_HOST="$(printf '%s' "$SERVER_HOST" | tr -d '[:space:]')"
          SSH_USER="$(printf '%s' "$SERVER_USER" | tr -d '[:space:]')"
          ssh -i ~/.ssh/arborlearn_deploy_key \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" \
            "APP_DIR='$APP_DIR' SERVICE_NAME='$SERVICE_NAME' bash -s" <<'REMOTE_SCRIPT'
            set -e
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Application repository not found at $APP_DIR"
              exit 1
            fi

            if [ ! -f "$APP_DIR/backend/.env" ]; then
              echo "Backend .env not found at $APP_DIR/backend/.env"
              exit 1
            fi

            if ! grep -q '^MODEL_API_KEY=' "$APP_DIR/backend/.env"; then
              echo "MODEL_API_KEY is not configured in $APP_DIR/backend/.env"
              exit 1
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            cd "$APP_DIR/backend"
            if [ ! -x .venv/bin/python ]; then
              python3 -m venv .venv
            fi

            .venv/bin/python -m pip install --upgrade pip
            .venv/bin/python -m pip install -r requirements.txt
            .venv/bin/python -m compileall app

            systemctl restart "$SERVICE_NAME"
            sleep 3
            systemctl is-active --quiet "$SERVICE_NAME"
            curl -fsS http://127.0.0.1:8000/api/health
          REMOTE_SCRIPT
