version: '3.8'

services:
  backend:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - MODEL_API_KEY=${MODEL_API_KEY}
      - MODEL_BASE_URL=${MODEL_BASE_URL:-https://api.deepseek.com}
      - MODEL_NAME=${MODEL_NAME:-deepseek-v4-pro}
      - AUTH_SECRET=${AUTH_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://8.163.11.131}
      - DATABASE_PATH=/app/data/arborlearn.sqlite3
      - VECTOR_DB_PATH=/app/data/lancedb
      - ENABLE_RAG=true
      - VECTOR_EMBEDDING_MODEL=all-MiniLM-L6-v2
      - ENABLE_OCR=${ENABLE_OCR:-true}
      - OCR_LANGUAGES=${OCR_LANGUAGES:-chi_sim+eng}
      - TESSERACT_CMD=${TESSERACT_CMD:-/usr/bin/tesseract}
      - OCR_TIMEOUT_SECONDS=${OCR_TIMEOUT_SECONDS:-12}
      - VISION_PROVIDER=${VISION_PROVIDER:-none}
      - VISION_BASE_URL=${VISION_BASE_URL:-http://127.0.0.1:8001/v1}
      - VISION_MODEL=${VISION_MODEL:-Qwen/Qwen2.5-VL-7B-Instruct}
      - VISION_API_KEY=${VISION_API_KEY:-}
      - VISION_TIMEOUT_SECONDS=${VISION_TIMEOUT_SECONDS:-75}
      - HF_ENDPOINT=https://hf-mirror.com
    volumes:
      - /var/lib/arborlearn/data:/app/data
      - /var/lib/arborlearn/logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - backend
    restart: unless-stopped
