/* 全局设计变量：上方是 Tailwind/shadcn 风格的 HSL token，下方是 ArborLearn 自定义表面色。 */
:root {
  --background: 204 45% 97%;
  --foreground: 222 28% 12%;
  --card: 0 0% 100%;
  --card-foreground: 222 28% 12%;
  --primary: 203 86% 40%;
  --primary-foreground: 0 0% 100%;
  --secondary: 168 42% 91%;
  --secondary-foreground: 174 64% 22%;
  --muted: 206 24% 92%;
  --muted-foreground: 219 12% 40%;
  --accent: 42 84% 91%;
  --accent-foreground: 33 70% 26%;
  --destructive: 0 70% 48%;
  --destructive-foreground: 0 0% 100%;
  --border: 209 22% 86%;
  --input: 209 22% 84%;
  --ring: 203 86% 40%;
  --tl-app-bg: #f3f8f9;
  --tl-app-bg-elevated: rgba(250, 253, 252, 0.34);
  --tl-panel: rgba(255, 255, 255, 0.44);
  --tl-panel-solid: #ffffff;
  --tl-panel-soft: rgba(243, 248, 247, 0.34);
  --tl-panel-muted: rgba(238, 246, 247, 0.22);
  --tl-border: rgba(72, 93, 110, 0.2);
  --tl-border-soft: rgba(72, 93, 110, 0.13);
  --tl-hover: rgba(17, 105, 132, 0.08);
  --tl-accent-soft: rgba(229, 245, 241, 0.86);
  --tl-input: #ffffff;
  --tl-user-bubble:
    linear-gradient(135deg, color-mix(in srgb, var(--tl-brand) 24%, transparent), color-mix(in srgb, var(--tl-brand-2) 14%, transparent)),
    color-mix(in srgb, var(--tl-panel-solid) 58%, transparent);
  --tl-user-bubble-fg: hsl(var(--foreground));
  --tl-user-bubble-border: color-mix(in srgb, var(--tl-brand) 28%, var(--tl-border));
  --tl-brand: #0f7da0;
  --tl-brand-2: #1f9d86;
  --tl-brand-3: #d99024;
  --tl-brand-soft: rgba(214, 239, 238, 0.88);
  --tl-shadow: 0 14px 34px rgba(37, 57, 76, 0.06), 0 1px 0 rgba(255, 255, 255, 0.5) inset;
  --tl-shadow-strong: 0 24px 56px rgba(25, 45, 64, 0.1), 0 1px 0 rgba(255, 255, 255, 0.58) inset;
  --tl-glow: 0 0 0 1px rgba(255, 255, 255, 0.55) inset, 0 20px 52px rgba(15, 125, 160, 0.10);
  --tl-interactive-shadow: 0 16px 38px rgba(15, 78, 104, 0.12), 0 0 0 1px rgba(255, 255, 255, 0.68) inset;
  --tl-focus-halo: 0 0 0 4px color-mix(in srgb, var(--tl-brand) 16%, transparent);
}

/* 统一盒模型，降低组件尺寸计算时的心智负担。 */
* {
  box-sizing: border-box;
}

html {
  scrollbar-gutter: stable;
}

/* 页面基础字体与背景；中文优先兼容 Microsoft YaHei，英文界面优先使用 Google Sans/Inter。 */
body {
  margin: 0;
  min-width: 320px;
  min-height: 100vh;
  background:
    radial-gradient(circle at 8% -10%, color-mix(in srgb, var(--tl-brand) 17%, transparent) 0, transparent 28rem),
    radial-gradient(circle at 92% 12%, color-mix(in srgb, var(--tl-brand-3) 16%, transparent) 0, transparent 26rem),
    hsl(var(--background));
  color: hsl(var(--foreground));
  font-family:
    "Google Sans", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
    "Microsoft YaHei", sans-serif;
  letter-spacing: 0;
  text-rendering: geometricPrecision;
}

.tl-theme-transitioning,
.tl-theme-transitioning body,
.tl-theme-transitioning .tl-app-bg,
.tl-theme-transitioning .tl-app-bg-elevated,
.tl-theme-transitioning .tl-panel,
.tl-theme-transitioning .tl-panel-soft,
.tl-theme-transitioning .tl-input,
.tl-theme-transitioning .tl-border,
.tl-theme-transitioning .tl-border-soft,
.tl-theme-transitioning button,
.tl-theme-transitioning input,
.tl-theme-transitioning textarea {
  transition:
    background-color 420ms ease,
    background 420ms ease,
    border-color 420ms ease,
    color 420ms ease,
    box-shadow 420ms ease,
    opacity 420ms ease;
}

/* 表单控件继承 body 字体，避免 textarea/input 出现系统默认字体跳变。 */
button,
textarea,
input {
  font: inherit;
}

/* 用户划选消息文本时的高亮颜色。 */
::-moz-selection {
  background: rgba(26, 115, 232, 0.18);
}
::selection {
  background: rgba(26, 115, 232, 0.18);
}

/* 自定义滚动条，使长对话、左侧树和导图区域风格一致。 */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

::-webkit-scrollbar-thumb {
  background: color-mix(in srgb, var(--tl-border) 72%, #8a929e);
  border: 3px solid transparent;
  border-radius: 999px;
  background-clip: padding-box;
}

::-webkit-scrollbar-track {
  background: transparent;
}

/* 消息中的子对话链接样式：看起来像正文中的知识点链接，而不是普通按钮。 */
.tree-link {
  border-bottom: 1px solid transparent;
  color: #0645ad;
  cursor: help;
  text-decoration: none;
  transition:
    border-color 120ms ease,
    color 120ms ease;
}

.tree-link:hover,
.tree-link:focus {
  border-bottom-color: currentColor;
  color: #0b57d0;
}

:root.dark .tree-link {
  color: #8ab4f8;
}

:root.dark .tree-link:hover,
:root.dark .tree-link:focus {
  border-bottom-color: currentColor;
  color: #aecbfa;
}

.tl-landing-atmosphere {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}

.tl-landing-atmosphere::before {
  content: "";
  position: absolute;
  left: 18%;
  right: -12%;
  top: 10%;
  height: 34rem;
  background:
    linear-gradient(105deg, transparent 10%, rgba(75, 178, 143, 0.16) 34%, rgba(15, 125, 160, 0.11) 52%, rgba(216, 151, 65, 0.08) 68%, transparent 88%);
  filter: blur(20px);
  opacity: 0.72;
  transform: rotate(-7deg);
  animation: landing-curtain 24s ease-in-out infinite alternate;
  z-index: 1;
}

:root.dark .tl-landing-atmosphere::before {
  background:
    linear-gradient(105deg, transparent 8%, rgba(25, 186, 150, 0.34) 32%, rgba(119, 220, 210, 0.24) 52%, rgba(71, 136, 111, 0.18) 70%, transparent 90%);
  filter: blur(16px);
  opacity: 0.92;
}

.tl-landing-atmosphere::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 100%, transparent 0 50%, rgba(219, 238, 229, 0.36) 84%),
    linear-gradient(90deg, rgba(240, 248, 244, 0.7), transparent 26%, transparent 74%, rgba(239, 248, 244, 0.72));
  z-index: 3;
}

:root.dark .tl-landing-atmosphere::after {
  background:
    radial-gradient(ellipse at 50% 100%, transparent 0 48%, rgba(1, 7, 10, 0.42) 82%),
    linear-gradient(90deg, rgba(2, 7, 10, 0.62), transparent 26%, transparent 74%, rgba(2, 7, 10, 0.66));
}

.tl-landing-grid {
  position: absolute;
  inset: -1px;
  background-image:
    linear-gradient(rgba(15, 125, 160, 0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(15, 125, 160, 0.08) 1px, transparent 1px);
  background-size: 52px 52px;
  -webkit-mask-image: radial-gradient(circle at 54% 22%, black 0, transparent 70%);
          mask-image: radial-gradient(circle at 54% 22%, black 0, transparent 70%);
  opacity: 0.46;
  z-index: 1;
}

:root.dark .tl-landing-grid {
  background-image:
    linear-gradient(rgba(119, 220, 210, 0.09) 1px, transparent 1px),
    linear-gradient(90deg, rgba(119, 220, 210, 0.09) 1px, transparent 1px);
  opacity: 0.32;
}

.tl-landing-aurora,
.tl-landing-orbit,
.tl-landing-particle {
  position: absolute;
}

.tl-landing-aurora {
  border-radius: 999px;
  filter: blur(42px);
  transform: translateZ(0);
  z-index: 0;

  }

  .tl-landing-orbit,
  .tl-landing-grid {
    display: none;
  }

  .tl-product-shot {
    border-radius: 1.2rem;
    min-height: 420px;
  }

  .tl-product-shot .grid {
    grid-template-columns: minmax(0, 1fr);
  }

  .tl-shot-card {
    min-height: 12rem;
  }

  .tl-diagram-shot {
    min-height: 420px;
  }

  .tl-diagram-shot [class*="absolute"] {
    transform: scale(0.84);
    transform-origin: center;
  }
}

@media (prefers-reduced-motion: reduce) {
  .ambient-aurora,
  .ambient-particle,
  .tl-landing-aurora,
  .tl-landing-orbit,
  .tl-landing-particle,
  .tl-lower-mist,
  .tl-lower-aurora,
  .tl-lower-particle,
  .tl-notebooks-aurora,
  .tl-notebooks-mist,
  .tl-notebooks-plant,
  .tl-notebooks-glow,
  .tl-notebooks-spark-field,
  .tl-notebooks-forest-bg::before,
  .tl-modal-backdrop,
  .tl-modal-panel,
  .tl-panel[data-state="open"],
  .tl-notebook-book::after,
  .tl-child-conversation-layout,
  .tl-child-parent-panel,
  .tl-child-active-panel,
  .tl-child-resize-handle,
  .tl-scroll-reveal,
  .tl-page-enter,
  .tl-workspace-stagger {
    transition: none;
    animation: none;
    opacity: 1;
    transform: none;
  }

  .tl-notebook-cover {
    transition: none;
  }
}
